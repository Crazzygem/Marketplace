# =============================================================================
# Marketplace Platform - Docker Compose Configuration
# =============================================================================
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose -f docker-compose.yml up -d
#   Stop:         docker compose down
#   View logs:    docker compose logs -f
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend - Angular SPA served by Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: marketplace-frontend
    restart: unless-stopped
    networks:
      - marketplace-network
    depends_on:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend - Laravel API with PHP-FPM
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: marketplace-backend
    restart: unless-stopped
    volumes:
      - backend-storage:/var/www/html/storage/app
      - backend-logs:/var/www/html/storage/logs
    networks:
      - marketplace-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_NAME=${APP_NAME:-Marketplace}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-marketplace}
      - DB_USERNAME=${DB_USERNAME:-marketplace}
      - DB_PASSWORD=${DB_PASSWORD:-secret_password}
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ['CMD-SHELL', 'php-fpm -t 2>/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy for Frontend + Backend
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: marketplace-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend-storage:/var/www/html/storage/app/public:ro
    networks:
      - marketplace-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MySQL - Database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: marketplace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-marketplace}
      MYSQL_USER: ${DB_USERNAME:-marketplace}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret_password}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - marketplace-network
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD:-root_secret}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ---------------------------------------------------------------------------
  # Redis - Caching & Queues (optional but recommended)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - marketplace-network
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  marketplace-network:
    driver: bridge
    name: marketplace-network

# =============================================================================
# Volumes - Persistent data storage
# =============================================================================
volumes:
  mysql-data:
    name: marketplace-mysql-data
  backend-storage:
    name: marketplace-backend-storage
  backend-logs:
    name: marketplace-backend-logs
  redis-data:
    name: marketplace-redis-data
